name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Assemble Customer Portal Demo
        run: |
          # Create a deployment directory
          mkdir -p _site
          
          # Copy only the approved files and scripts for the customer portal demo
          cp login.html _site/
          cp dashboard.html _site/
          cp shell.js _site/
          
          # Copy logo assets if the folder exists
          if [ -d "logo" ]; then
            cp -r logo _site/
          fi
          
          # Make login.html the entrypoint (index.html) so it loads automatically on the main URL
          cp login.html _site/index.html
          
          echo "Successfully assembled approved customer portal pages in _site/:"
          ls -la _site/

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
